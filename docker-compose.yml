version: '3.8'

networks:
  korp_network:
    driver: bridge

services:
  # Container 1: Servidor em Golang com métricas
  http-server-projeto-korp:
    build:
      context: .
      dockerfile: dockerfile
    container_name: http-server-projeto-korp
    networks:
      - korp_network

  # Container 2: Proxy Reverso NGINX
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./http-server-projeto-korp.conf:/etc/nginx/conf.d/default.conf
    networks:
      - korp_network
    depends_on:
      - http-server-projeto-korp

  # Container 3: Coletor de Métricas Prometheus
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus_monitor
    user: "root"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - korp_network
    depends_on:
      - http-server-projeto-korp

  # Container 4: Painel de Gráficos Grafana
  grafana:
    image: grafana/grafana:10.0.0
    container_name: grafana_dashboard
    ports:
      - "3000:3000"
    networks:
      - korp_network
    depends_on:
      - prometheus
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/provisioning/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
